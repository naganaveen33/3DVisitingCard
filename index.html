<!DOCTYPE html>
<html>
  <head>
    <title>WebAR 3D Model Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }

      #scanOverlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.5s;
      }

      #scanOverlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .scan-container {
        text-align: center;
        max-width: 90%;
      }

      .scan-title {
        color: white;
        font-size: 24px;
        margin-bottom: 30px;
        font-weight: 300;
        letter-spacing: 1px;
      }

      .target-preview {
        position: relative;
        width: 280px;
        height: 280px;
        margin: 0 auto 20px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.1);
      }

      .target-image {
        width: 100%;
        height: 100%;
        object-fit: contain;
        opacity: 0.4;
        filter: blur(1px);
      }

      .scan-animation {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 3px;
        background: linear-gradient(90deg,
          transparent 0%,
          rgba(76, 175, 80, 0.8) 50%,
          transparent 100%);
        animation: scan 2s ease-in-out infinite;
        box-shadow: 0 0 20px rgba(76, 175, 80, 0.8);
      }

      @keyframes scan {
        0%  { transform: translateY(0); }
        50% { transform: translateY(277px); }
        100%{ transform: translateY(0); }
      }

      .scan-instruction {
        color: rgba(255, 255, 255, 0.8);
        font-size: 16px;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>

    <!-- Scan Overlay -->
    <div id="scanOverlay">
      <div class="scan-container">
        <h2 class="scan-title">Scan the Image</h2>
        <div class="target-preview">
          <img id="previewImg" src="./assets/target_image.jpg" alt="Target" class="target-image">
          <div class="scan-animation"></div>
        </div>
        <p class="scan-instruction">Point your camera at this image</p>
      </div>
    </div>

    <a-scene
      mindar-image="imageTargetSrc: ./assets/targets.mind; filterMinCF: 0.0001; filterBeta: 0.001;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: true"
      renderer="colorManagement: true;">

      <a-assets timeout="30000">
        <!-- Preload the GLB model -->
        <a-asset-item id="arModel" src="./assets/model.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Attach 3D model to image target -->
      <a-entity mindar-image-target="targetIndex: 0">
        <!--
          position: centered on target (0 0 0)
          scale:    1 1 1 fits the model to ~1 A-Frame unit (≈ target width).
                    Tweak the three values uniformly if the model appears too big/small.
          rotation: -90 0 0  corrects the common "lying flat" GLB orientation.
                    Remove or adjust if your model already stands upright.
        -->
        <a-gltf-model
          id="arModel3D"
          src="#arModel"
          position="0 0 0"
          rotation="-90 0 0"
          scale="1 1 1"
          visible="false">
        </a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      const scanOverlay = document.getElementById('scanOverlay');
      const previewImg  = document.getElementById('previewImg');
      const model3D     = document.getElementById('arModel3D');

      // Hide broken preview image gracefully
      previewImg.onerror = () => { previewImg.style.display = 'none'; };

      // Auto-fit the model to the target image dimensions once loaded
      model3D.addEventListener('model-loaded', () => {
        const mesh = model3D.getObject3D('mesh');
        if (!mesh) return;

        // Compute the bounding box of the loaded mesh
        const THREE = AFRAME.THREE;
        const box   = new THREE.Box3().setFromObject(mesh);
        const size  = new THREE.Vector3();
        box.getSize(size);

        // The MindAR target plane is 1 unit wide by default.
        // Scale the model so its largest horizontal dimension = 1 unit.
        const maxDim    = Math.max(size.x, size.y, size.z);
        const fitScale  = 1 / maxDim;

        model3D.setAttribute('scale', `${fitScale} ${fitScale} ${fitScale}`);

        // Re-center the model so its base sits on the target surface
        box.setFromObject(mesh); // recompute after scale
        const center = new THREE.Vector3();
        box.getCenter(center);
        model3D.setAttribute('position', `${-center.x * fitScale} ${-center.y * fitScale} 0`);
      });

      // Target found / lost
      const targetEl = document.querySelector('[mindar-image-target]');

      targetEl.addEventListener('targetFound', () => {
        scanOverlay.classList.add('hidden');
        model3D.setAttribute('visible', 'true');
      });

      targetEl.addEventListener('targetLost', () => {
        scanOverlay.classList.remove('hidden');
        model3D.setAttribute('visible', 'false');
      });
    </script>
  </body>
</html>
